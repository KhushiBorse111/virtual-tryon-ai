# NGINX Configurations for Reverse Proxy

# Upstream configuration for backend services
upstream backend {
    server backend_service:5000;  # Change this to your backend service address
}

# Upstream configuration for frontend services
upstream frontend {
    server frontend_service:3000;  # Change this to your frontend service address
}

server {
    listen 80;
    server_name your_domain.com;  # Change this to your domain

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}