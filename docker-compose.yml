version: '3.8'\n\nservices:\n  backend:\n    image: your-backend-image\n    build:\n      context: ./backend\n    ports:\n      - "5000:5000"\n    environment:\n      - DATABASE_URL=mysql://user:password@database/dbname\n    networks:\n      - app-network\n\n  frontend:\n    image: your-frontend-image\n    build:\n      context: ./frontend\n    ports:\n      - "3000:3000"\n    networks:\n      - app-network\n\n  database:\n    image: mysql:5.7\n    ports:\n      - "3306:3306"\n    environment:\n      MYSQL_ROOT_PASSWORD: password\n      MYSQL_DATABASE: dbname\n      MYSQL_USER: user\n      MYSQL_PASSWORD: password\n    networks:\n      - app-network\n\n  nginx:\n    image: nginx:latest\n    ports:\n      - "80:80"\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf\n    networks:\n      - app-network\n\nnetworks:\n  app-network:\n    driver: bridge\n