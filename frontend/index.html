<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Try-On</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Virtual Try-On Interface</h1>
    </header>
    <main>
        <section id="upload">
            <h2>Upload Your Photo</h2>
            <input type="file" id="photo-upload" accept="image/*">
            <button id="upload-btn">Upload</button>
        </section>
        <section id="clothing-selection">
            <h2>Select Clothing</h2>
            <div id="clothing-items">
                <!-- Clothing items will be dynamically populated here -->
            </div>
        </section>
        <section id="result-display">
            <h2>Your Virtual Try-On Result</h2>
            <div id="result-image">
                <!-- Result image will be displayed here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Virtual Try-On Interface</p>
    </footer>
</body>
</html>
