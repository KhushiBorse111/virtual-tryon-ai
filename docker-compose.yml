version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DB_HOST: db
    depends_on:
      - db
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
